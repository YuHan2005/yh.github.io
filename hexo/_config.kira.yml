# ===== Kira 主题配置 =====
# 文档：https://kira.host/hexo/

avatar: /images/avatar.png # 网站 Logo / 头像
background: # 既是博客的背景，又是文章默认头图
    path: /images/background.jpg
    width: 1280
    height: 720
favicon:
    href: /images/avatar.png # 网站图标
    type: image/png # 图标类型 (image/png, image/vnd.microsoft.icon, image/x-icon, image/gif)

# 附加图标库 使用说明：https://kira.host/hexo/config/icon.html
# iconlib: //at.alicdn.com/t/font_3299330_el19bsi97h8.css

cdn:
    gitalk:
        css: https://unpkg.com/gitalk@latest/dist/gitalk.css
        js: https://unpkg.com/gitalk@latest/dist/gitalk.min.js
    giscus:
        js: https://giscus.app/client.js

# beian: # 备案号（选填）

menu:
    回到首页:
        - /
        - icon-home
    文章归档:
        - /archives/
        - icon-container
    关于本人:
        - /about/
        - icon-user
    我的朋友:
        - /friends/
        - icon-team

widgets:
    - social
    - category
    - tagcloud
    - archive

maxTagcloud: 0 # 标签云组件显示的标签数量，0 表示不限制

social:
    GitHub:
        - https://github.com/YuHan2005
        - icon-github
        - rgb(25, 23, 23)
        - rgba(25, 23, 23, .15)

color: # 配色方案，从 first 到 seventh 优先级为 1-7，默认为彩虹配色
    first: # 同时作为主题色
        r: 49
        g: 174
        b: 255
    second:
        r: 255
        g: 78
        b: 106
    third:
        r: 255
        g: 185
        b: 0
    fourth:
        r: 51
        g: 213
        b: 122
    fifth:
        r: 0
        g: 219
        b: 255
    sixth:
        r: 255
        g: 69
        b: 0
    seventh:
        r: 144
        g: 144
        b: 255

# 评论区（默认关闭，需要时填入自己的仓库信息后开启）
gitalk:
    active: false
giscus:
    active: false
    repo: YuHan2005/yh.github.io
    repoID: ''
    category: General
    categoryID: ''
    mapping: pathname
    theme: light
    lang: zh-CN

copyright: '<strong>版权声明：</strong>本文采用 <a href="https://creativecommons.org/licenses/by-nc-sa/3.0/cn/deed.zh" target="_blank">CC BY-NC-SA 3.0 CN</a> 协议进行许可'
copyTip: "著作权归作者所有。\n商业转载请联系作者获得授权，非商业转载请注明出处。\n来源：%url"

# 自定义侧边栏尾部内容
sidebar: ''

# 自定义样式
# customStyles:
#     - style
#     - custom

# 友链配置
friends:
    - avatar: /images/avatar.png
      link: https://github.com/YuHan2005
      name: YuHan

# 可复制的代码块
copyableCodeblock: true
